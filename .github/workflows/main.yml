name: Main

on:
  push:
    branches:
      - master

  pull_request:
    branches:
      - '**'
jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: superdispatch/actions/prepare-node-repo@v2
        with:
          pnpm-version: 10.25
      - run: pnpm run tsc
      - run: pnpm run lint
      - run: pnpm run test
      - uses: codecov/codecov-action@v5
      - run: pnpm run build
